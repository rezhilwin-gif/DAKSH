<!DOCTYPE html>
<html>
<head>
    <title>MentorDash - SASTRA Student Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f1f5f9; }
        .topbar {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            padding: 16px 24px; color: white;
            display: flex; gap: 12px; align-items: center;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }
        .topbar h1 { margin: 0; font-size: 20px; margin-right: 24px; }
        input { padding: 10px 14px; border-radius: 8px; border: none; font-size: 14px; }
        button {
            padding: 10px 18px; border: none; border-radius: 8px;
            background: rgba(255,255,255,0.2); color: white;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
        .btn-primary { background: #22c55e; }
        .btn-primary:hover { background: #16a34a; }
        #content { padding: 24px; min-height: calc(100vh - 60px); }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .card-header { display: flex; align-items: center; margin-bottom: 16px; }
        .card-header h3 { margin: 0; font-size: 16px; color: #1e293b; }
        .card-header .icon { font-size: 20px; margin-right: 10px; }
        .alert-banner {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border: 1px solid #fca5a5; border-left: 4px solid #ef4444;
            border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
        }
        .alert-title { color: #ef4444; font-weight: 700; font-size: 16px; margin-bottom: 12px; }
        .alert-students { display: flex; gap: 10px; flex-wrap: wrap; }
        .alert-student {
            background: white; border: 1px solid #fca5a5; border-radius: 8px;
            padding: 10px 14px; display: flex; align-items: center; gap: 10px;
        }
        .alert-pct {
            background: #ef4444; color: white; font-weight: 700; font-size: 12px;
            padding: 6px 10px; border-radius: 50%; min-width: 40px; text-align: center;
        }
        .stat-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            flex: 1; min-width: 120px; background: white; border-radius: 12px;
            padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-value { font-size: 32px; font-weight: 800; color: #1e293b; }
        .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
        .stat-value.red { color: #ef4444; }
        .stat-value.green { color: #22c55e; }
        .stat-value.purple { color: #7c3aed; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .followup-item {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
            padding: 14px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px;
        }
        .followup-checkbox { width: 24px; height: 24px; cursor: pointer; }
        .followup-text { flex: 1; }
        .followup-action { font-weight: 600; color: #1e293b; margin-bottom: 4px; }
        .followup-meta { font-size: 12px; color: #64748b; }
        .followup-meta span { background: #f1f5f9; padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
        .recommendation-card {
            border-left: 4px solid #f59e0b; background: #fffbeb;
            border-radius: 10px; padding: 14px; margin-bottom: 10px;
        }
        .recommendation-card.high { border-left-color: #ef4444; background: #fef2f2; }
        .rec-title { font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .rec-suggestion { font-size: 13px; color: #475569; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        th { background: #7c3aed; color: white; padding: 14px; text-align: left; font-weight: 600; }
        td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; }
        tr:hover td { background: #f8fafc; }
        .loading { text-align: center; padding: 60px; color: #64748b; }
        .loading::after {
            content: ''; display: block; width: 40px; height: 40px; margin: 20px auto;
            border: 4px solid #e2e8f0; border-top-color: #7c3aed;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { opacity: 0.85; box-shadow: 0 0 20px 5px rgba(239, 68, 68, 0.5); }
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }
        .alert-banner { animation: blink 1.5s ease-in-out infinite; }
        .alert-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #ef4444; color: white; padding: 4px 10px;
            border-radius: 20px; font-size: 12px; font-weight: 700;
            animation: blink 1s ease-in-out infinite;
        }
        .alert-badge::before {
            content: ''; width: 8px; height: 8px; background: white;
            border-radius: 50%; animation: pulse-dot 1s ease-in-out infinite;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 20px; background: white; border: 2px solid #e2e8f0;
            border-radius: 8px; cursor: pointer; font-weight: 600; color: #64748b; transition: all 0.2s;
        }
        .tab.active { background: #7c3aed; border-color: #7c3aed; color: white; }
        .tab:hover:not(.active) { border-color: #7c3aed; color: #7c3aed; }
        .tab.alert-tab { position: relative; }
        .tab.alert-tab .blink-indicator {
            position: absolute; top: -4px; right: -4px;
            width: 12px; height: 12px; background: #ef4444;
            border-radius: 50%; animation: pulse-dot 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>🎓 MentorDash</h1>
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="loadDashboard()" class="btn-primary">📊 Load Dashboard</button>
        <button onclick="loadAll()">👥 All Students</button>
        <button onclick="loadMasterAttendance()">📥 Export Attendance</button>
    </div>

    <div id="content">
        <div style="text-align: center; padding: 80px; color: #64748b;">
            <div style="font-size: 64px; margin-bottom: 20px;">🎓</div>
            <h2 style="color: #1e293b; margin-bottom: 8px;">Welcome to MentorDash</h2>
            <p>Enter your credentials and click "Load Dashboard" to get started</p>
        </div>
    </div>

    <script>
        let dashboardData = null;
        let currentTab = 'overview';

        async function loadDashboard() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (!username || !password) { alert('Please enter username and password'); return; }

            document.getElementById("content").innerHTML = '<div class="loading">Loading dashboard...</div>';

            try {
                const response = await fetch("http://localhost:5000/mentor-dashboard-summary", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                dashboardData = await response.json();
                renderDashboard();
            } catch (err) {
                console.error(err);
                document.getElementById("content").innerHTML = '<div class="loading">Error loading dashboard. Is the server running?</div>';
            }
        }

        function renderDashboard() {
            if (!dashboardData || !dashboardData.data) {
                document.getElementById("content").innerHTML = '<div class="loading">No data available</div>';
                return;
            }

            const mentees = dashboardData.data || [];
            
            const below75 = mentees.filter(m => {
                const attMetric = m.metrics?.find(met => met.label?.includes('Attendance'));
                const pct = attMetric?.numericValue ?? 100;
                return pct < 75;
            }).map(m => {
                const attMetric = m.metrics?.find(met => met.label?.includes('Attendance'));
                return { ...m, attPct: attMetric?.numericValue ?? 0 };
            });

            const urgent = dashboardData.summary?.urgent || mentees.filter(m => m.risk === 'urgent').length;
            const warning = dashboardData.summary?.warning || mentees.filter(m => m.risk === 'warning').length;
            const onTrack = dashboardData.summary?.onTrack || mentees.filter(m => m.risk === 'track').length;

            let html = `
                <div class="tabs">
                    <div class="tab ${currentTab === 'overview' ? 'active' : ''}" onclick="switchTab('overview')">📊 Overview</div>
                    <div class="tab ${currentTab === 'students' ? 'active' : ''}" onclick="switchTab('students')">👥 Students</div>
                    <div class="tab ${currentTab === 'followups' ? 'active' : ''}" onclick="switchTab('followups')">✅ Follow-ups</div>
                    <div class="tab alert-tab ${currentTab === 'alerts' ? 'active' : ''}" onclick="switchTab('alerts')" style="${below75.length > 0 || urgent > 0 ? 'background: linear-gradient(135deg, #ef4444, #dc2626); border-color: #ef4444; color: white; animation: blink 1.2s ease-in-out infinite;' : ''}">
                        🚨 AI Alerts ${below75.length > 0 || urgent > 0 ? '<span class="blink-indicator"></span>' : ''}
                    </div>
                </div>
            `;

            if (currentTab === 'overview') {
                if (below75.length > 0) {
                    html += `
                        <div class="alert-banner">
                            <div class="alert-title">📊 Attendance Alert: ${below75.length} student${below75.length !== 1 ? 's' : ''} below 75%</div>
                            <div class="alert-students">
                                ${below75.slice(0, 8).map(s => `
                                    <div class="alert-student">
                                        <div class="alert-pct">${s.attPct}%</div>
                                        <div>
                                            <div style="font-weight: 600; color: #1e293b;">${s.name?.split(' ')[0] || 'Student'}</div>
                                            <div style="font-size: 11px; color: #ef4444;">${s.attPct < 65 ? 'Critical' : 'Low'} Attendance</div>
                                        </div>
                                    </div>
                                `).join('')}
                                ${below75.length > 8 ? `<div class="alert-student" style="background: #f1f5f9;">+${below75.length - 8} more</div>` : ''}
                            </div>
                        </div>
                    `;
                }

                html += `
                    <div class="stat-row">
                        <div class="stat-card"><div class="stat-value purple">${mentees.length}</div><div class="stat-label">Total Students</div></div>
                        <div class="stat-card"><div class="stat-value red">${urgent}</div><div class="stat-label">🔴 Urgent</div></div>
                        <div class="stat-card"><div class="stat-value" style="color: #f59e0b;">${warning}</div><div class="stat-label">⚠️ Warning</div></div>
                        <div class="stat-card"><div class="stat-value green">${onTrack}</div><div class="stat-label">✅ On Track</div></div>
                        <div class="stat-card"><div class="stat-value red">${below75.length}</div><div class="stat-label">📊 Below 75%</div></div>
                    </div>
                    <div class="dashboard-grid">
                        <div class="card">
                            <div class="card-header"><span class="icon">🔴</span><h3>Urgent Attention Required</h3></div>
                            ${mentees.filter(m => m.risk === 'urgent').slice(0, 5).map(s => `
                                <div style="display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9;">
                                    <div style="flex: 1;"><div style="font-weight: 600; color: #1e293b;">${s.name}</div><div style="font-size: 12px; color: #64748b;">${s.roll || s.id}</div></div>
                                    <button onclick="loadStudentFollowups('${s.id}', '${s.name}', '${s.roll}')" style="background: #7c3aed; font-size: 12px; padding: 6px 12px;">View</button>
                                </div>
                            `).join('') || '<div style="color: #64748b; text-align: center; padding: 20px;">No urgent cases 🎉</div>'}
                        </div>
                        <div class="card">
                            <div class="card-header"><span class="icon">📊</span><h3>Low Attendance Students</h3></div>
                            ${below75.slice(0, 5).map(s => `
                                <div style="display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9;">
                                    <div style="background: #ef4444; color: white; font-weight: 700; padding: 4px 8px; border-radius: 6px; margin-right: 10px;">${s.attPct}%</div>
                                    <div style="flex: 1;"><div style="font-weight: 600; color: #1e293b;">${s.name}</div></div>
                                    <button onclick="loadStudentFollowups('${s.id}', '${s.name}', '${s.roll}')" style="background: #7c3aed; font-size: 12px; padding: 6px 12px;">Follow-ups</button>
                                </div>
                            `).join('') || '<div style="color: #22c55e; text-align: center; padding: 20px;">All students have ≥75% attendance! ✅</div>'}
                        </div>
                    </div>
                `;
            } else if (currentTab === 'students') {
                html += `
                    <table>
                        <thead><tr><th>Name</th><th>Register No</th><th>Risk</th><th>Attendance</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${mentees.map(s => {
                                const attMetric = s.metrics?.find(met => met.label?.includes('Attendance'));
                                const attValue = attMetric?.value || 'N/A';
                                const riskColor = s.risk === 'urgent' ? '#ef4444' : s.risk === 'warning' ? '#f59e0b' : '#22c55e';
                                const riskLabel = s.risk === 'urgent' ? '🔴 Urgent' : s.risk === 'warning' ? '⚠️ Warning' : '✅ On Track';
                                return `<tr>
                                    <td style="font-weight: 600;">${s.name}</td>
                                    <td>${s.roll || s.id}</td>
                                    <td><span style="color: ${riskColor}; font-weight: 600;">${riskLabel}</span></td>
                                    <td>${attValue}</td>
                                    <td><button onclick="loadStudentFollowups('${s.id}', '${s.name}', '${s.roll}')" style="background: #7c3aed; font-size: 12px; padding: 6px 12px;">Follow-ups</button></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                `;
            } else if (currentTab === 'followups') {
                html += `
                    <div class="card">
                        <div class="card-header"><span class="icon">✅</span><h3>AI-Extracted Follow-ups</h3></div>
                        <p style="color: #64748b; margin-bottom: 16px;">Select a student to view their AI-analyzed action items:</p>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            ${mentees.slice(0, 20).map(s => `
                                <button onclick="loadStudentFollowups('${s.id}', '${s.name}', '${s.roll}')" style="background: #f1f5f9; color: #1e293b; font-size: 12px;">${s.name?.split(' ')[0] || 'Student'}</button>
                            `).join('')}
                        </div>
                        <div id="followups-content" style="margin-top: 20px;"></div>
                    </div>
                `;
            } else if (currentTab === 'alerts') {
                html += `
                    <div class="alert-banner" style="animation: blink 1.5s ease-in-out infinite;">
                        <div class="alert-title" style="font-size: 20px; display: flex; align-items: center; gap: 12px;">
                            <span style="font-size: 28px;">🚨</span> AI Alert Center
                            <span class="alert-badge">${below75.length + urgent} Active Alerts</span>
                        </div>
                    </div>
                    
                    <div class="dashboard-grid">
                        <div class="card" style="border: 2px solid #ef4444;">
                            <div class="card-header"><span class="icon" style="font-size: 24px;">📊</span><h3 style="color: #ef4444;">Attendance Below 75% (${below75.length})</h3></div>
                            ${below75.length > 0 ? below75.map(s => `
                                <div style="display: flex; align-items: center; padding: 10px; margin-bottom: 8px; background: linear-gradient(135deg, #fef2f2, #fee2e2); border-radius: 10px; border: 1px solid #fca5a5;">
                                    <div style="background: ${s.attPct < 65 ? '#dc2626' : '#ef4444'}; color: white; font-weight: 800; padding: 8px 12px; border-radius: 8px; margin-right: 12px; font-size: 16px;">${s.attPct}%</div>
                                    <div style="flex: 1;">
                                        <div style="font-weight: 700; color: #1e293b; font-size: 14px;">${s.name}</div>
                                        <div style="font-size: 12px; color: #ef4444; font-weight: 600;">${s.attPct < 65 ? '🔴 CRITICAL' : '⚠️ LOW'} - Immediate Action Required</div>
                                    </div>
                                    <button onclick="loadStudentFollowups('${s.id}', '${s.name}', '${s.roll}')" style="background: #ef4444; font-size: 12px; padding: 8px 14px;">View Actions</button>
                                </div>
                            `).join('') : '<div style="color: #22c55e; text-align: center; padding: 30px; font-size: 18px;">✅ All students have ≥75% attendance!</div>'}
                        </div>
                        
                        <div class="card" style="border: 2px solid #f59e0b;">
                            <div class="card-header"><span class="icon" style="font-size: 24px;">🔴</span><h3 style="color: #f59e0b;">Urgent Risk Students (${urgent})</h3></div>
                            ${mentees.filter(m => m.risk === 'urgent').length > 0 ? mentees.filter(m => m.risk === 'urgent').map(s => `
                                <div style="display: flex; align-items: center; padding: 10px; margin-bottom: 8px; background: linear-gradient(135deg, #fffbeb, #fef3c7); border-radius: 10px; border: 1px solid #fcd34d;">
                                    <div style="font-size: 24px; margin-right: 12px;">⚠️</div>
                                    <div style="flex: 1;">
                                        <div style="font-weight: 700; color: #1e293b; font-size: 14px;">${s.name}</div>
                                        <div style="font-size: 12px; color: #d97706;">${s.roll || s.id}</div>
                                    </div>
                                    <button onclick="loadStudentFollowups('${s.id}', '${s.name}', '${s.roll}')" style="background: #f59e0b; font-size: 12px; padding: 8px 14px;">Review</button>
                                </div>
                            `).join('') : '<div style="color: #22c55e; text-align: center; padding: 30px; font-size: 18px;">✅ No urgent cases!</div>'}
                        </div>
                    </div>
                    
                    <div class="card" style="background: linear-gradient(135deg, #1e1b4b, #312e81); color: white;">
                        <div class="card-header"><span class="icon" style="font-size: 24px;">🤖</span><h3 style="color: white;">AI Recommendations Summary</h3></div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 16px;">
                            ${below75.length > 0 ? '<div style="background: rgba(239,68,68,0.2); padding: 16px; border-radius: 12px; border: 1px solid rgba(239,68,68,0.3);"><div style="font-size: 24px; margin-bottom: 8px;">📊</div><div style="font-weight: 700;">Attendance Focus</div><div style="font-size: 12px; opacity: 0.8;">Schedule meetings with ' + below75.length + ' students to improve attendance</div></div>' : ''}
                            ${urgent > 0 ? '<div style="background: rgba(251,191,36,0.2); padding: 16px; border-radius: 12px; border: 1px solid rgba(251,191,36,0.3);"><div style="font-size: 24px; margin-bottom: 8px;">🎯</div><div style="font-weight: 700;">Priority Counseling</div><div style="font-size: 12px; opacity: 0.8;">' + urgent + ' students need immediate academic intervention</div></div>' : ''}
                            <div style="background: rgba(34,197,94,0.2); padding: 16px; border-radius: 12px; border: 1px solid rgba(34,197,94,0.3);"><div style="font-size: 24px; margin-bottom: 8px;">✅</div><div style="font-weight: 700;">On Track</div><div style="font-size: 12px; opacity: 0.8;">${onTrack} students performing well - encourage them!</div></div>
                        </div>
                    </div>
                `;
            }

            document.getElementById("content").innerHTML = html;
        }

        function switchTab(tab) { currentTab = tab; renderDashboard(); }

        async function loadStudentFollowups(studentID, studentName, registerNo) {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const container = document.getElementById("followups-content") || document.getElementById("content");
            container.innerHTML = '<div class="loading">Loading AI follow-ups...</div>';

            try {
                const response = await fetch("http://localhost:5000/student-followups", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ studentID, studentName, registerNo: registerNo || studentID, username, password, daysBack: 60 })
                });
                const data = await response.json();
                renderFollowups(data, studentName);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="color: #ef4444; padding: 20px;">Error loading follow-ups</div>';
            }
        }

        function renderFollowups(data, studentName) {
            const container = document.getElementById("followups-content") || document.getElementById("content");
            
            if (!data.success || !data.actionItems || data.actionItems.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 40px; color: #64748b;"><div style="font-size: 48px; margin-bottom: 16px;">✅</div><h3 style="color: #1e293b;">No Action Items for ${studentName}</h3><p>Meeting notes with actionable items will appear here</p></div>`;
                return;
            }

            let html = `
                <div style="background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                    <h3 style="margin: 0 0 8px 0;">🤖 AI Follow-ups for ${studentName}</h3>
                    <div style="display: flex; gap: 20px; font-size: 14px; flex-wrap: wrap;">
                        <span>📋 ${data.summary?.totalActionItems || 0} Action Items</span>
                        <span>📊 ${data.summary?.categories?.attendance || 0} Attendance</span>
                        <span>📚 ${data.summary?.categories?.academic || 0} Academic</span>
                        <span>💼 ${data.summary?.categories?.career || 0} Career</span>
                    </div>
                </div>
            `;

            if (data.recommendations && data.recommendations.length > 0) {
                html += `<h4 style="margin: 0 0 12px 0; color: #1e293b;">🧠 AI Recommendations</h4>`;
                data.recommendations.forEach(rec => {
                    html += `<div class="recommendation-card ${rec.priority}"><div class="rec-title">${rec.icon} ${rec.title}</div><div class="rec-suggestion">${rec.suggestion}</div></div>`;
                });
            }

            html += `<h4 style="margin: 20px 0 12px 0; color: #1e293b;">✅ Action Items</h4>`;
            data.actionItems.forEach((item, idx) => {
                const catIcon = item.category === 'attendance' ? '📊' : item.category === 'academic' ? '📚' : item.category === 'career' ? '💼' : '📝';
                html += `
                    <div class="followup-item" id="followup-${idx}">
                        <input type="checkbox" class="followup-checkbox" onclick="toggleFollowup(${idx})">
                        <div class="followup-text">
                            <div class="followup-action">${item.action}</div>
                            <div class="followup-meta"><span>${catIcon} ${item.category || 'General'}</span><span>📅 ${item.date}</span><span>📍 ${item.source}</span></div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function toggleFollowup(idx) {
            const item = document.getElementById(`followup-${idx}`);
            const checkbox = item.querySelector('input');
            const text = item.querySelector('.followup-action');
            if (checkbox.checked) {
                item.style.background = '#f0fdf4'; item.style.borderColor = '#86efac';
                text.style.textDecoration = 'line-through'; text.style.color = '#16a34a';
            } else {
                item.style.background = '#f8fafc'; item.style.borderColor = '#e2e8f0';
                text.style.textDecoration = 'none'; text.style.color = '#1e293b';
            }
        }

        async function loadMasterAttendance() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            document.getElementById("content").innerHTML = '<div class="loading">Generating Master Attendance Excel...</div>';

            try {
                const response = await fetch("http://localhost:5000/master-attendance", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!data.length) { document.getElementById("content").innerHTML = '<div class="loading">No data found.</div>'; return; }

                const worksheet = XLSX.utils.json_to_sheet(data);
                worksheet["!cols"] = Object.keys(data[0]).map(key => ({ wch: Math.max(key.length, ...data.map(row => row[key] ? row[key].toString().length : 5)) }));
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Master Attendance");
                XLSX.writeFile(workbook, "Master_Attendance_All_Students.xlsx");
                document.getElementById("content").innerHTML = `<div style="text-align: center; padding: 60px;"><div style="font-size: 64px; margin-bottom: 20px;">✅</div><h2 style="color: #22c55e;">Master Attendance Excel Downloaded!</h2><button onclick="loadDashboard()" class="btn-primary" style="background: #7c3aed; margin-top: 20px;">Back to Dashboard</button></div>`;
            } catch (err) {
                console.error(err);
                document.getElementById("content").innerHTML = '<div class="loading">Error generating file.</div>';
            }
        }

        async function loadAll() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            document.getElementById("content").innerHTML = '<div class="loading">Loading all students...</div>';

            try {
                const response = await fetch("http://localhost:5000/all-students", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const students = await response.json();
                if (!students.length) { document.getElementById("content").innerHTML = '<div class="loading">No students found.</div>'; return; }

                let html = `<div style="margin-bottom: 20px;"><button onclick="loadDashboard()" style="background: #7c3aed;">← Back to Dashboard</button></div>
                    <table><thead><tr><th>Name</th><th>Register No</th><th>Semester</th><th>Action</th></tr></thead><tbody>`;
                students.forEach(student => {
                    html += `<tr><td style="font-weight: 600;">${student.Name}</td><td>${student.RegisterNo}</td><td>${student.Semester}</td>
                        <td><button onclick="downloadStudent('${student.StudentID}', '${student.Semester}', '${student.ProgramID}', '${student.Name}')" style="background: #22c55e; font-size: 12px;">Download Summary</button></td></tr>`;
                });
                html += `</tbody></table>`;
                document.getElementById("content").innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById("content").innerHTML = '<div class="loading">Error loading students.</div>';
            }
        }

        async function downloadStudent(studentID, semesterID, programID, studentName) {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            try {
                const response = await fetch("http://localhost:5000/student-full-report", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password, studentID, programID, semesterID, studentName })
                });
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = `${studentName}_Summary.xlsx`;
                document.body.appendChild(a); a.click(); a.remove();
            } catch (err) {
                console.error(err);
                alert("Error downloading summary");
            }
        }
    </script>
